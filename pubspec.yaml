name: toukh_ui
description: Shared Toukh design tokens, Material themes, and Flutter widgets.
version: 0.2.0
publish_to: "none"

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1
  firebase_messaging: ^15.1.6
  firebase_remote_config: ^5.2.0
  flutter_local_notifications: ^18.0.1
  get: ^4.7.3
  equatable: ^2.0.7
  http: ^1.2.2
  package_info_plus: ^8.3.0
  pub_semver: ^2.1.5
  url_launcher: ^6.3.1
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_logo.png
